workflows:
  android-debug-build:
    name: Countdown to Worlds - Debug APK
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Download gradle-wrapper.jar
        script: |
          curl -L "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
      - name: Set executable permission on gradlew
        script: chmod +x gradlew
      - name: Build debug APK
        script: ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - euan.m.obrien@gmail.com
        notify:
          success: true
          failure: true
