workflows:
  android-debug-build:
    name: Countdown to Worlds - Debug APK
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Set executable permission on gradlew
        script: chmod +x gradlew
      - name: Build debug APK
        script: ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - euan.m.obrien@gmail.com
        notify:
          success: true
          failure: true
